<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<meta content="width=device-width" name="viewport"/>
<title>Javascript Tester</title>
<style>.swirlConsoleCont{resize:both;background:rgba(0,0,0,.5);border-radius:20px;border:5px solid #222;display:grid;z-index:500;backdrop-filter:blur(5px);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;color:#fff;color-scheme:dark;overflow:hidden;grid-template-rows:1fr 8fr;font-size:15px}.swirlConsoleHeader{width:100%;background:rgba(0,0,0,.5);padding:10px;display:flex;flex-direction:column;justify-content:center;cursor:move;user-select:none}.swirlConsoleHeader h1{font-size:20px;margin:0}.swirlConsoleMain{overflow-y:auto;overflow-x:hidden}.swirlConsole-msg{border-bottom:2px solid rgba(255,255,255,.2);overflow-wrap:anywhere;white-space:break-spaces}.swirlConsole-msg.swirlError{color:#fea3a3}.swirlConsole-msg.swirlError:before{content:'ⓧ'}.swirlConsole-msg.swirlWarn{color:#ffe370}.swirlConsole-msg.swirlWarn:before{content:'⚠'}.swirlConsole-msg:hover{background:rgba(255,255,255,.1)}.swirlConsoleInput{border:none;background:0 0;font-size:15px;padding:0}.swirlConsoleInput:focus{outline:0}.swirlConsole-msg,.swirlConsoleInputCont{padding:5px 0;display:grid;grid-template-columns:1fr 25fr}.swirlMsgCont{display:contents}.swirlConsole-msg:before{content:'';font-weight:700}.swirlConsole-msg.swirlUser:before,.swirlConsoleInputCont:before{content:'>';font-weight:700;color:#03fc66}.swirlConsole-msg:before,.swirlConsoleInputCont:before{text-align:center}.swirlConsoleCont {
	position:absolute;
	top:5vh;
	right:5vw;
	width:90vw;
	height:90vh;
	resize:none !important;
}
body {
	background-color:black;
	background-image: radial-gradient(circle at 0 100%, #D29FF6 0%, transparent 50%), radial-gradient(circle at 100% 0, #F764E9 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(101,213,247,0.2) 0%, transparent 20%), radial-gradient(circle at 0 0, rgba(255,153,196,0.4) 0%, transparent 20%);
	width:100vw;
	height:100vh;
	padding:0;
	margin:0;
}</style>
</head>
<body>
<script>class spiralConsole {
	constructor(p=document.body,options){
		const htmlValue = "<div class='swirlConsoleCont'><header class='swirlConsoleHeader'><h1>"+(options.t||'Swirl Console')+"</h1><span>"+(options.s||'Type in the bottom field!')+"</span></header><main class='swirlConsoleMain'><div class='swirlMsgCont'></div><div class='swirlConsoleInputCont'><input class='swirlConsoleInput'></input></div></main></div>";
		p.insertAdjacentHTML('beforeend',htmlValue);
		this.eventInputs = [];
		this.echoPrompt = options.e ?? true;
		this.consoleElm = p.children[p.children.length-1];
		this.titleElm = this.consoleElm.getElementsByTagName('h1')[0];
		this.subtitleElm = this.consoleElm.getElementsByTagName('span')[0];
		this.promptElm = this.consoleElm.getElementsByClassName('swirlConsoleInput')[0];
		this.contElm = this.consoleElm.getElementsByClassName('swirlMsgCont')[0];
		this.promptElm.addEventListener('keydown',e=>{
			if(e.key==='Enter'&&!e.shiftKey){
				e.preventDefault();
				const t = this.promptElm.value;
				this.echoPrompt && this.log(t,3);
				for(let i=0;i<this.eventInputs.length;i++){
					this.eventInputs[i](t);
				}
				this.promptElm.value='';
			}
		});
	}
	onInput(f){this.eventInputs.push(f)}
	offInput(f){this.eventInputs.splice(this.eventInputs.indexOf(f),1)}
	get title(){return this.titleElm.innerText;}
	set title(t){this.titleElm.innerText=t;}
	get subtitle(){return this.subtitleElm.innerText;}
	set subtitle(t){this.subtitleElm.innerText=t;}
	log(m,o=0){
		const me = document.createElement('div');
		me.className='swirlConsole-msg';
		me.innerText=m;
		switch(o){
		case 1:
			me.classList.add('swirlWarn');
			break;
		case 2:
			me.classList.add('swirlError');
			break;
		case 3:
			me.classList.add('swirlUser');
		}
		this.contElm.appendChild(me);
		this.promptElm.scrollIntoView();
	}
}
const uiConsole = new spiralConsole(document.body,{t:'Javascript Tester',s:'A program by Frostbyte. Powered by Spiral Console.'});

function consoleCapture(o){
	return function(...args){
		uiConsole.log(args.map(m=>{
			if(typeof m === "object"){ // && !Array.isArray(ret)
				let consoleOut=m+'';
				const props = Object.getOwnPropertyNames(m);
				for(let i=0;i<props.length;i++){consoleOut+=props[i]+": "+m[props[i]]+"\n"}
				return consoleOut;
			}else{
				return String(m);
			}
		}).join(' '),o)
	}
}

console.log = consoleCapture(0);
console.warn = consoleCapture(1);
console.error = consoleCapture(2);
console.info = consoleCapture(0);
console.debug = consoleCapture(3);
console.dir = consoleCapture(0);
addEventListener('error', e=>{
	uiConsole.log(e.toString()+'\n'+e.stack,2);
});
addEventListener('unhandledrejection', e=>{
    uiConsole.log(e.reason,2);
});
uiConsole.onInput(m=>{
	try{
		console.log(eval(m));
	}catch(e){
		console.error(e.toString()+'\n'+e.stack);
	}
});</script>
</body>
</html>
